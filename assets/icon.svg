<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <title>LLM Local Router</title>
  <desc>A routing hub fanning out to three provider endpoints: the active route is
  highlighted, the alternates are failover candidates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26364c"/>
      <stop offset="1" stop-color="#151d2b"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="54" fill="url(#bg)"/>

  <!-- Routes. Alternates are drawn first so the active route sits on top. -->
  <g fill="none" stroke-linecap="round">
    <path d="M78 128 C 126 128, 130 76, 176 76" stroke="#4c5a70" stroke-width="10"/>
    <path d="M78 128 C 126 128, 130 180, 176 180" stroke="#4c5a70" stroke-width="10"/>
    <path d="M78 128 H 176" stroke="#38bdf8" stroke-width="12"/>
  </g>

  <!-- Provider endpoints: active one accented, alternates muted. -->
  <circle cx="186" cy="76" r="16" fill="#64748b"/>
  <circle cx="186" cy="180" r="16" fill="#64748b"/>
  <circle cx="186" cy="128" r="18" fill="#38bdf8"/>

  <!-- Routing hub. -->
  <circle cx="74" cy="128" r="26" fill="#38bdf8"/>
  <circle cx="74" cy="128" r="10" fill="#151d2b"/>
</svg>
